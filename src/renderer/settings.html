<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OverlayAI Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div>
          <p class="eyebrow">OverlayAI</p>
          <h1>Floating AI overlay</h1>
        </div>
        <div class="hero-actions">
          <button id="toggleOverlay" class="primary">Toggle Overlay</button>
          <button id="reloadSite">Reload Site</button>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>Website</h2>
          <label>
            Active site
            <select id="activeSite"></select>
          </label>
          <label>
            Custom site name
            <input id="customSiteName" type="text" placeholder="My local LLM" />
          </label>
          <label>
            Custom site URL
            <input id="customSiteUrl" type="url" placeholder="https://example.com/chat" />
          </label>
          <div class="row">
            <button id="saveCustomSite">Save Custom Site</button>
            <button id="resetSession" class="danger">Reset Session</button>
          </div>
          <div class="row">
            <button id="resetOverlayPosition">Reset Overlay Position</button>
          </div>
          <p id="formStatus" class="warning"></p>
          <p id="siteStatus" class="subtle"></p>
        </div>

        <div class="panel">
          <h2>Hotkey</h2>
          <label>
            Shortcut
            <span class="hotkey-row">
              <input id="hotkey" type="text" placeholder="CommandOrControl+Space" spellcheck="false" />
              <button
                type="button"
                id="hotkeyCapture"
                class="hotkey-capture"
                title="Click here, then press your shortcut (e.g. Ctrl+Shift+Space). Escape cancels. You can still type the shortcut in the box."
              >
                Press keys...
              </button>
            </span>
          </label>
          <p class="warning" id="hotkeyStatus"></p>
          <label class="toggle">
            <input id="deepHookEnabled" type="checkbox" />
            <span>Enable Deep Hook mode for exclusive fullscreen games</span>
          </label>
          <p class="warning" id="deepHookStatus"></p>
        </div>

        <div class="panel">
          <h2>Overlay</h2>
          <label>
            Width
            <input id="overlayWidth" type="number" min="320" max="1200" step="10" />
          </label>
          <label>
            Height
            <input id="overlayHeight" type="number" min="320" max="1200" step="10" />
          </label>
          <label>
            Opacity
            <input id="opacity" type="range" min="0.35" max="1" step="0.05" />
          </label>
          <label>
            Auto-dismiss timeout
            <input id="autoDismiss" type="range" min="0" max="60" step="1" />
            <span id="autoDismissValue"></span>
          </label>
          <label class="toggle">
            <input id="dismissOnBlur" type="checkbox" />
            <span>Hide when focus leaves overlay</span>
          </label>
          <label class="toggle">
            <input id="pinMode" type="checkbox" />
            <span>Pin overlay open</span>
          </label>
        </div>

        <div class="panel">
          <h2>Appearance</h2>
          <label class="toggle">
            <input id="matchSystemTheme" type="checkbox" />
            <span>Match system appearance</span>
          </label>
          <label>
            Force theme
            <select id="forceTheme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <p class="subtle">
            The overlay shell stays native-looking while the loaded website keeps its own theme where possible.
          </p>
        </div>

        <div class="panel">
          <h2>Selection Assist</h2>
          <label class="toggle">
            <input id="selectionAssistEnabled" type="checkbox" />
            <span>Enable asking about copied text</span>
          </label>
          <label>
            Assist shortcut
            <input id="selectionAssistHotkey" type="text" placeholder="CommandOrControl+Shift+Space" spellcheck="false" />
          </label>
          <p class="subtle">
            Select text in another app, copy it, then press the assist shortcut to send it into the chat box.
          </p>
        </div>
      </section>
    </main>
    <script src="./settings.js"></script>
  </body>
</html>
